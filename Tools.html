ng> Son obligatorios para definir el esquema de entrada de la herramienta.","children":[],"payload":{"tag":"li","lines":"17,18"}},{"content":"<strong>Docstrings:</strong> Se utilizan por defecto como la descripci&#xf3;n que ayuda al modelo a entender cu&#xe1;ndo usar la herramienta.","children":[],"payload":{"tag":"li","lines":"18,19"}}],"payload":{"tag":"li","lines":"16,19"}},{"content":"<strong>Personalizaci&#xf3;n de propiedades:</strong>","children":[{"content":"<strong>Nombres:</strong> Se prefiere el formato <code>snake_case</code> (ej. <code>web_search</code>) para mejorar la compatibilidad entre proveedores de modelos.","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"<strong>Descripciones personalizadas:</strong> Es posible sobrescribir la descripci&#xf3;n generada autom&#xe1;ticamente para guiar mejor al modelo.","children":[],"payload":{"tag":"li","lines":"21,22"}}],"payload":{"tag":"li","lines":"19,22"}},{"content":"<strong>Esquemas avanzados:</strong> Posibilidad de definir entradas complejas utilizando modelos de <strong>Pydantic</strong> o esquemas <strong>JSON</strong>.","children":[],"payload":{"tag":"li","lines":"22,24"}}],"payload":{"tag":"h3","lines":"14,15"}},{"content":"III. Acceso al Contexto y Gesti&#xf3;n de Memoria (<code>ToolRuntime</code>)","children":[{"content":"<strong>Memoria a corto plazo (State):</strong>","children":[{"content":"Datos mutables que existen durante la conversaci&#xf3;n actual (historial de mensajes, contadores).","children":[],"payload":{"tag":"li","lines":"27,28"}},{"content":"Se accede mediante <code>runtime.state</code> y se puede actualizar usando <code>Command</code>.","children":[],"payload":{"tag":"li","lines":"28,29"}}],"payload":{"tag":"li","lines":"26,29"}},{"content":"<strong>Memoria a largo plazo (Store):</strong>","children":[{"content":"Datos persistentes que sobreviven a trav&#xe9;s de diferentes conversaciones.","children":[],"payload":{"tag":"li","lines":"30,31"}},{"content":"Utiliza un patr&#xf3;n de espacio de nombres y clave para organizar la informaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"31,32"}}],"payload":{"tag":"li","lines":"29,32"}},{"content":"<strong>Contexto inmutable:</strong> Configuraci&#xf3;n pasada en el momento de la invocaci&#xf3;n, como IDs de usuario o informaci&#xf3;n de sesi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"<strong>Capacidades adicionales de Runtime:</strong>","children":[{"content":"<strong>Stream Writer:</strong> Para emitir actualizaciones en tiempo real durante ejecuciones largas.","children":[],"payload":{"tag":"li","lines":"34,35"}},{"content":"<strong>Execution Info:</strong> Acceso a IDs de hilo (thread ID), IDs de ejecuci&#xf3;n y estado de reintentos.","children":[],"payload":{"tag":"li","lines":"35,36"}},{"content":"<strong>Server Info:</strong> Metadatos espec&#xed;ficos cuando se ejecuta en LangGraph Server (ID de asistente, usuario autenticado).","children":[],"payload":{"tag":"li","lines":"36,38"}}],"payload":{"tag":"li","lines":"33,38"}}],"payload":{"tag":"h3","lines":"24,25"}},{"content":"IV. Ejecuci&#xf3;n y Flujo de Trabajo con <code>ToolNode</code>","children":[{"content":"<strong>Funci&#xf3;n:</strong> Nodo preconstruido en LangGraph que gestiona la ejecuci&#xf3;n paralela de herramientas, el manejo de errores y la inyecci&#xf3;n de estado de forma autom&#xe1;tica.","children":[],"payload":{"tag":"li","lines":"39,40"}},{"content":"<strong>Tipos de valores de retorno:</strong>","children":[{"content":"<strong>String:</strong> Para resultados legibles por humanos que el modelo procesar&#xe1; en su siguiente respuesta.","children":[],"payload":{"tag":"li","lines":"41,42"}},{"content":"<strong>Object (ej. dict):</strong> Para datos estructurados que el modelo debe inspeccionar y razonar.","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"<strong>Command:</strong> Utilizado cuando la herramienta no solo devuelve datos, sino que necesita mutar el estado del agente.","children":[],"payload":{"tag":"li","lines":"43,45"}}],"payload":{"tag":"li","lines":"40,45"}}],"payload":{"tag":"h3","lines":"38,39"}},{"content":"V. Restricciones y Tipos de Herramientas","children":[{"content":"<strong>Nombres de argumentos reservados:</strong> Los par&#xe1;metros <code>config</code> y <code>runtime</code> est&#xe1;n reservados para uso interno y no pueden usarse como argumentos de la herramienta.","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"<strong>Herramientas preconstruidas:</strong> Colecci&#xf3;n de utilidades listas para usar en tareas como b&#xfa;squeda web o acceso a bases de datos.","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"<strong>Uso de herramientas en el servidor:</strong> Algunos modelos tienen herramientas integradas (int&#xe9;rpretes de c&#xf3;digo, b&#xfa;squeda) que se ejecutan del lado del proveedor.","children":[],"payload":{"tag":"li","lines":"48,49"}}],"payload":{"tag":"h3","lines":"45,46"}}],"payload":{"tag":"h1","lines":"7,8"}},{"colorFreezeLevel":2,"maxWidth":500})</script>
