f3;n de respuesta y uso de tokens.","children":[],"payload":{"tag":"li","lines":"16,18"}}],"payload":{"tag":"li","lines":"13,18"}}],"payload":{"tag":"h3","lines":"9,10"}},{"content":"II. Modos de Uso y Formatos","children":[{"content":"<strong>Prompts de Texto:</strong> Cadenas de texto simples ideales para tareas aisladas sin necesidad de historial de conversaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"19,20"}},{"content":"<strong>Prompts de Mensaje:</strong> Listas de objetos de mensaje utilizadas para conversaciones multi-turno, contenido multimodal e instrucciones del sistema.","children":[],"payload":{"tag":"li","lines":"20,21"}},{"content":"<strong>Formato de Diccionario:</strong> Soporte directo para el formato de completado de chat de OpenAI.","children":[],"payload":{"tag":"li","lines":"21,23"}}],"payload":{"tag":"h3","lines":"18,19"}},{"content":"III. Tipos Principales de Mensajes","children":[{"content":"<strong>SystemMessage:</strong> Instrucciones iniciales para definir el comportamiento, tono y directrices del modelo.","children":[],"payload":{"tag":"li","lines":"24,25"}},{"content":"<strong>HumanMessage:</strong> Representa la entrada del usuario y puede contener m&#xfa;ltiples formas de contenido (texto, im&#xe1;genes, audio, archivos).","children":[],"payload":{"tag":"li","lines":"25,26"}},{"content":"<strong>AIMessage:</strong> Respuesta generada por el modelo, que incluye texto, llamadas a herramientas (tool calls) y metadatos espec&#xed;ficos del proveedor.","children":[],"payload":{"tag":"li","lines":"26,27"}},{"content":"<strong>ToolMessage:</strong> Se utiliza para pasar los resultados de la ejecuci&#xf3;n de una herramienta de vuelta al modelo.","children":[{"content":"<strong>Atributos clave:</strong> Requiere un <code>tool_call_id</code> que coincida con el ID del <code>AIMessage</code> original.","children":[],"payload":{"tag":"li","lines":"28,29"}},{"content":"<strong>Campo Artifact:</strong> Permite almacenar datos adicionales para uso program&#xe1;tico o depuraci&#xf3;n que no se env&#xed;an al modelo para no saturar su contexto.","children":[],"payload":{"tag":"li","lines":"29,31"}}],"payload":{"tag":"li","lines":"27,31"}}],"payload":{"tag":"h3","lines":"23,24"}},{"content":"IV. Atributos y Estructura T&#xe9;cnica","children":[{"content":"<strong>Identificaci&#xf3;n:</strong> Cada mensaje tiene un <code>id</code> &#xfa;nico generado autom&#xe1;ticamente o devuelto por el proveedor.","children":[],"payload":{"tag":"li","lines":"32,33"}},{"content":"<strong>Gesti&#xf3;n de Consumo:</strong> El atributo <code>usage_metadata</code> rastrea el conteo de tokens cuando est&#xe1; disponible.","children":[],"payload":{"tag":"li","lines":"33,34"}},{"content":"<strong>Streaming y Chunks:</strong> Durante el streaming se utilizan objetos <strong>AIMessageChunk</strong> y <strong>ToolCallChunk</strong>, que permiten reconstruir el mensaje completo de forma progresiva.","children":[],"payload":{"tag":"li","lines":"34,36"}}],"payload":{"tag":"h3","lines":"31,32"}},{"content":"V. Bloques de Contenido (Content Blocks)","children":[{"content":"<strong>Bloques Core:</strong>","children":[{"content":"<strong>TextContentBlock:</strong> Salida de texto est&#xe1;ndar.","children":[],"payload":{"tag":"li","lines":"40,41"}},{"content":"<strong>ReasoningContentBlock:</strong> Pasos de razonamiento del modelo (ej. pensamiento interno).","children":[],"payload":{"tag":"li","lines":"41,42"}}],"payload":{"tag":"li","lines":"39,42"}},{"content":"<strong>Bloques Multimodales:</strong>","children":[{"content":"<strong>ImageContentBlock, AudioContentBlock, VideoContentBlock:</strong> Soportan URLs o datos codificados en base64.","children":[],"payload":{"tag":"li","lines":"43,44"}},{"content":"<strong>FileContentBlock:</strong> Para archivos gen&#xe9;ricos como PDFs.","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>PlainTextContentBlock:</strong> Para documentos de texto plano o markdown.","children":[],"payload":{"tag":"li","lines":"45,46"}}],"payload":{"tag":"li","lines":"42,46"}},{"content":"<strong>Bloques de Llamada a Herramientas:</strong>","children":[{"content":"<strong>ToolCall:</strong> Definici&#xf3;n de la funci&#xf3;n a llamar y sus argumentos.","children":[],"payload":{"tag":"li","lines":"47,48"}},{"content":"<strong>ToolCallChunk:</strong> Fragmentos para streaming de llamadas.","children":[],"payload":{"tag":"li","lines":"48,49"}},{"content":"<strong>InvalidToolCall:</strong> Para capturar errores de parseo JSON o llamadas mal formadas.","children":[],"payload":{"tag":"li","lines":"49,50"}}],"payload":{"tag":"li","lines":"46,50"}},{"content":"<strong>Ejecuci&#xf3;n en Servidor:</strong>","children":[{"content":"<strong>ServerToolCall / ServerToolResult:</strong> Espec&#xed;ficos para herramientas ejecutadas en el lado del servidor.","children":[],"payload":{"tag":"li","lines":"51,53"}}],"payload":{"tag":"li","lines":"50,53"}}],"payload":{"tag":"h3","lines":"36,37"}},{"content":"VI. Interacci&#xf3;n con Modelos de Chat","children":[{"content":"<strong>Ciclo de Conversaci&#xf3;n:</strong> Los modelos de chat aceptan una secuencia de mensajes como entrada y devuelven un <code>AIMessage</code>.","children":[],"payload":{"tag":"li","lines":"54,55"}},{"content":"<strong>Gesti&#xf3;n de Contexto:</strong> Debido a que las interacciones suelen ser sin estado (stateless), LangChain ofrece estrategias para persistir el historial, recortar mensajes o resumirlos para manejar las ventanas de contexto.","children":[],"payload":{"tag":"li","lines":"55,56"}}],"payload":{"tag":"h3","lines":"53,54"}}]},{"colorFreezeLevel":2,"maxWidth":300})</script>
