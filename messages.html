uesta del proveedor.","children":[],"payload":{"tag":"li","lines":"33,35"}}],"payload":{"tag":"h3","lines":"28,29"}},{"content":"V. Contenido y Multimodalidad","children":[{"content":"<strong>Flexibilidad del contenido:</strong> Soporta cadenas de texto o listas de objetos (bloques de contenido).","children":[],"payload":{"tag":"li","lines":"36,37"}},{"content":"<strong>Multimodalidad:</strong> Capacidad de procesar y generar datos en diferentes formas como <strong>im&#xe1;genes, audio, video y archivos (PDF)</strong>.","children":[],"payload":{"tag":"li","lines":"37,38"}},{"content":"<strong>Bloques de Contenido Est&#xe1;ndar:</strong> Interfaz segura y consistente (v&#xed;a <code>content_blocks</code>) que unifica los formatos de distintos proveedores.","children":[],"payload":{"tag":"li","lines":"38,40"}}],"payload":{"tag":"h3","lines":"35,36"}},{"content":"VI. Referencia de Bloques de Contenido","children":[{"content":"<strong>N&#xfa;cleo:</strong>","children":[{"content":"<code>TextContentBlock</code>: Salida de texto est&#xe1;ndar.","children":[],"payload":{"tag":"li","lines":"42,43"}},{"content":"<code>ReasoningContentBlock</code>: Pasos de razonamiento del modelo.","children":[],"payload":{"tag":"li","lines":"43,44"}}],"payload":{"tag":"li","lines":"41,44"}},{"content":"<strong>Multimodal:</strong> Bloques espec&#xed;ficos para imagen, audio, video y archivos generales.","children":[],"payload":{"tag":"li","lines":"44,45"}},{"content":"<strong>Llamadas a Herramientas:</strong>","children":[{"content":"<code>ToolCall</code> y <code>ToolCallChunk</code> (para streaming).","children":[],"payload":{"tag":"li","lines":"46,47"}},{"content":"<code>InvalidToolCall</code>: Para capturar errores de parseo.","children":[],"payload":{"tag":"li","lines":"47,48"}}],"payload":{"tag":"li","lines":"45,48"}},{"content":"<strong>Ejecuci&#xf3;n en Servidor:</strong> Bloques para llamadas, fragmentos y resultados de herramientas ejecutadas en el lado del servidor.","children":[]
