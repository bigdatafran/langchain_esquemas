<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - LangChain & LangGraph Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-tech-bg: #0A0A0A;
            --color-tech-card: #141414;
            --color-tech-line: #262626;
            --color-brand-primary: #10B981;
        }
        body {
            background-color: var(--color-tech-bg);
            color: white;
            font-family: 'Inter', sans-serif;
        }
        .tech-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, var(--color-tech-line) 1px, transparent 1px),
                linear-gradient(to bottom, var(--color-tech-line) 1px, transparent 1px);
        }
        .glow { filter: blur(100px); z-index: 0; }
        .input-tech {
            background-color: #0A0A0A;
            border: 1px solid #262626;
            color: white;
            transition: all 0.3s ease;
        }
        .input-tech:focus {
            border-color: var(--color-brand-primary);
            outline: none;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="antialiased min-h-screen">
    <div class="fixed inset-0 tech-grid opacity-20 pointer-events-none"></div>
    <div class="fixed top-0 right-0 w-[50%] h-[50%] bg-emerald-500/5 glow rounded-full pointer-events-none"></div>

    <main class="relative z-10 max-w-4xl mx-auto px-6 py-20">
        <a href="index.html" class="inline-flex items-center text-xs font-mono text-gray-500 hover:text-emerald-400 transition-colors mb-12 uppercase tracking-widest">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="m15 18-6-6 6-6"/></svg>
            Volver al Directorio
        </a>

        <header class="mb-12">
            <h1 class="text-4xl lg:text-5xl font-bold tracking-tight mb-4">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-blue-500">
                    Contactar con Soporte
                </span>
            </h1>
            <p class="text-gray-400 text-lg font-light">¿Tienes dudas sobre la implementación de agentes o flujos?</p>
        </header>

        <div class="bg-[#141414]/50 border border-[#262626] rounded-2xl p-8 lg:p-12">
            <form id="contactForm" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Ej. Alan Turing" class="w-full p-4 rounded-xl input-tech text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Email Corporativo</label>
                        <input type="email" id="email" required placeholder="email@dominio.com" class="w-full p-4 rounded-xl input-tech text-sm">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Asunto de la Consulta</label>
                    <select id="asunto" class="w-full p-4 rounded-xl input-tech text-sm appearance-none cursor-pointer">
                        <option value="Implementacion LangGraph">Implementación de LangGraph</option>
                        <option value="Optimizacion Prompts">Optimización de Prompts</option>
                        <option value="Arquitectura Agentes">Arquitectura de Agentes</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Mensaje / Requerimiento</label>
                    <textarea id="mensaje" required rows="5" placeholder="Describe tu consulta técnica aquí..." class="w-full p-4 rounded-xl input-tech text-sm resize-none"></textarea>
                </div>

                <button type="submit" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-black font-bold text-xs uppercase tracking-widest rounded-xl transition-all duration-300 transform active:scale-[0.98]">
                    Preparar Email
                </button>
            </form>

            <script>
                document.getElementById('contactForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const nombre = document.getElementById('nombre').value;
                    const email = document.getElementById('email').value;
                    const asunto = document.getElementById('asunto').value;
                    const mensaje = document.getElementById('mensaje').value;

                    const mailtoLink = `mailto:frrgcsocial@gmail.com?subject=${encodeURIComponent('Consulta LangChain Hub: ' + asunto)}&body=${encodeURIComponent(
                        'Nombre: ' + nombre + '\\n' +
                        'Email: ' + email + '\\n\\n' +
                        'Mensaje:\\n' + mensaje
                    )}`;

                    window.location.href = mailtoLink;
                });
            </script>
        </div>

        <footer class="mt-20 pt-8 border-t border-[#262626] text-center text-gray-600 text-[10px] font-mono tracking-widest uppercase">
            Protocolo de Comunicación AI-Systems v1.0
        </footer>
    </main>
</body>
</html>
